<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%" fill="none">
  <!-- Cable rope -->
  <line x1="5" y1="15" x2="115" y2="35" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
  
  <!-- Hanger wheels and mechanism -->
  <circle cx="50" cy="24" r="8" stroke="currentColor" stroke-width="2.5" fill="none" />
  <circle cx="50" cy="24" r="2.5" fill="currentColor" />
  <circle cx="70" cy="28" r="8" stroke="currentColor" stroke-width="2.5" fill="none" />
  <circle cx="70" cy="28" r="2.5" fill="currentColor" />
  
  <!-- Hanger connecting bar -->
  <line x1="50" y1="24" x2="70" y2="28" stroke="currentColor" stroke-width="3" />
  
  <!-- Ladder hanger support structure -->
  <path d="M 60 26 L 48 65 L 72 65 Z" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linejoin="round" />
  <line x1="56" y1="40" x2="64" y2="42" stroke="currentColor" stroke-width="2" />
  <line x1="52" y1="52" x2="68" y2="55" stroke="currentColor" stroke-width="2" />
  
  <!-- Cabin base connector -->
  <rect x="42" y="61" width="36" height="4" rx="1" fill="currentColor" />
  
  <!-- Main cabin body -->
  <rect x="25" y="65" width="70" height="45" rx="8" stroke="currentColor" stroke-width="3" fill="none" />
  
  <!-- Cabin door in the center -->
  <rect x="52" y="65" width="16" height="45" stroke="currentColor" stroke-width="2.5" fill="none" />
  <line x1="60" y1="65" x2="60" y2="110" stroke="currentColor" stroke-width="1.5" />
  
  <!-- Cabin side windows -->
  <!-- Left window -->
  <rect x="31" y="71" width="16" height="20" rx="3" stroke="currentColor" stroke-width="2" fill="none" />
  <!-- Right window -->
  <rect x="73" y="71" width="16" height="20" rx="3" stroke="currentColor" stroke-width="2" fill="none" />
  
  <!-- Door windows -->
  <rect x="55" y="71" width="4" height="15" rx="1" stroke="currentColor" stroke-width="1.5" fill="none" />
  <rect x="61" y="71" width="4" height="15" rx="1" stroke="currentColor" stroke-width="1.5" fill="none" />
  
  <!-- Bottom panel fill/accent -->
  <path d="M 26.5 98 L 93.5 98 A 6.5 6.5 0 0 1 87 108.5 L 33 108.5 A 6.5 6.5 0 0 1 26.5 98 Z" fill="currentColor" opacity="0.25" />
</svg>
